<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="p-4 bg-light">
  <div class="container shadow-sm bg-white p-4 rounded-4">
    <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
      <div>
        <h3 class="fw-bold m-0"><i class="far fa-calendar-check text-primary me-2"></i>PROGRAMADOR DE PREVENTIVOS</h3>
        <p class="text-muted small m-0">Selecciona los equipos para generar sus órdenes de trabajo mensuales.</p>
      </div>
      <button class="btn btn-success btn-lg fw-bold px-4" onclick="generarSeleccionados()">
        <i class="fas fa-magic me-2"></i>GENERAR ÓRDENES DEL MES
      </button>
    </div>

    <div class="table-responsive">
      <table class="table table-hover align-middle border">
        <thead class="bg-light">
          <tr>
            <th width="40"><input type="checkbox" class="form-check-input" id="checkAll"></th>
            <th>MÁQUINA</th>
            <th>PLAN DE MANTENIMIENTO</th>
            <th>ÚLTIMA FECHA</th>
            <th>PRÓXIMA FECHA</th>
            <th>ESTADO</th>
          </tr>
        </thead>
        <tbody id="cuerpoCalendario">
          <!-- Ejemplo de fila interactiva -->
          <tr>
            <td><input type="checkbox" class="form-check-input check-item"></td>
            <td><span class="fw-bold">INYECTORA 05</span></td>
            <td>Preventivo Nivel 2 (Semestral)</td>
            <td>15/01/2026</td>
            <td><span class="text-danger fw-bold">15/02/2026</span></td>
            <td><span class="badge bg-danger">VENCIDA</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</body>
</html>
