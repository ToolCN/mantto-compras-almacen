<!DOCTYPE html>
<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .sidebar-panel { background: #f1f4f9; border-radius: 10px; padding: 20px; height: 100%; }
    .task-item { transition: 0.2s; cursor: pointer; border-left: 4px solid transparent; }
    .task-item:hover { background: #fff; border-left: 4px solid #3498db; transform: translateX(5px); }
  </style>
</head>
<body class="bg-light">
  <div class="container-fluid p-4">
    <div class="row">
      <!-- Panel de Creación -->
      <div class="col-md-4 mb-4">
        <div class="sidebar-panel shadow-sm">
          <h5 class="fw-bold mb-4 text-primary"><i class="fas fa-plus-circle me-2"></i>Nueva Tarea MP</h5>
          <div class="mb-3">
            <label class="form-label small fw-bold">Máquina / Equipo</label>
            <select id="selectMaq" class="form-select"></select>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Descripción de Tarea</label>
            <textarea id="descTarea" class="form-control" rows="3" placeholder="Ej: Lubricación de chumaceras..."></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Frecuencia (Días)</label>
            <input type="number" id="frecuencia" class="form-control" value="30">
          </div>
          <button class="btn btn-primary w-100 fw-bold" onclick="guardarTarea()">
            <i class="fas fa-save me-2"></i>REGISTRAR TAREA
          </button>
        </div>
      </div>

      <!-- Listado de Tareas -->
      <div class="col-md-8">
        <div class="bg-white p-4 rounded-3 shadow-sm border">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold m-0 text-secondary">CATÁLOGO DE TAREAS PREVENTIVAS</h5>
            <input type="text" id="busqueda" class="form-control w-50" placeholder="Buscar máquina o tarea...">
          </div>
          <div class="table-responsive" style="max-height: 600px; overflow-y: auto;">
            <table class="table align-middle">
              <thead class="table-dark">
                <tr>
                  <th>Máquina</th>
                  <th>Actividad</th>
                  <th>Ciclo</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="listaTareas">
                <!-- Dinámico -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Al cargar, obtener catálogos
    window.onload = () => {
      google.script.run.withSuccessHandler(data => {
        const select = document.getElementById('selectMaq');
        data.maquinas.forEach(m => {
          let opt = new Option(m.nombre, m.nombre);
          select.add(opt);
        });
        cargarTablaTareas();
      }).getCatalogos();
    };

    function cargarTablaTareas() {
      // Función para traer datos de la hoja MP_TAREAS y pintarlos con botones de borrar/editar
    }
  </script>
</body>
</html>
