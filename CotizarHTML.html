<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    :root { 
      --primary: #1a237e; --bg: #f4f7f6; --success: #2e7d32; 
      --danger: #d32f2f; --yellow-mod: #fff9c4; --green-active: #c8e6c9;
      --vibrant-yellow: #FFFF00; 
    }
    body { font-family: 'Roboto', sans-serif; background: var(--bg); margin: 0; padding: 10px; overflow-x: hidden; }

    /* --- LOADER --- */
    #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #ffffff; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .tool-container { width: 450px; height: 140px; }
    .text-svg { font-size: 100px; font-weight: 900; text-anchor: middle; }
    .liquid { animation: fill-anim 3s infinite ease-in-out; }
    @keyframes fill-anim { 0%, 100% { transform: translateY(120px); } 50% { transform: translateY(0px); } }
    .clean-outline { filter: drop-shadow(2px 0px 0px black) drop-shadow(-2px 0px 0px black) drop-shadow(0px 2px 0px black) drop-shadow(0px -2px 0px black); }

    /* --- FILTROS Y ESPEJO --- */
    .filter-bar { background: var(--primary); padding: 10px 20px; border-radius: 15px 15px 0 0; display: flex; gap: 15px; align-items: center; }
    .search-input { flex: 1; padding: 10px; border-radius: 8px; border: none; outline: none; }
    
    .mirror-box { 
      background-color: #e3f2fd; 
      padding: 12px 20px; 
      border-bottom: 2px solid #bbdefb;
      font-weight: 900; 
      font-size: 15px; 
      color: #1a237e; 
      min-height: 1.2em;
      text-transform: uppercase;
      white-space: normal;
      word-break: break-word;
    }

    /* --- TABLA --- */
    .container { background: white; border-radius: 0 0 15px 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; table-layout: fixed; }
    th { background: #f0f0f0; padding: 10px 5px; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #ddd; font-weight: 900; }
    td { border: 1px solid #eee; padding: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; height: 40px; }
    
    /* ANCHOS */
    .col-fec { width: 75px; } .col-adj { width: 35px; } .col-fol { width: 65px; } .col-sol { width: 85px; } .col-pa { width: 30px; } .col-can { width: 40px; } .col-des { width: 330px; } .col-prio { width: 85px; } .col-pro { width: 160px; } .col-mon { width: 80px; } .col-tot { width: 110px; } .col-acc { width: 60px; }
    
    .row-modified { background-color: var(--yellow-mod) !important; }
    .row-active { background-color: var(--green-active) !important; outline: 2px solid var(--primary); outline-offset: -2px; }
    .input-edit { width: 100%; border: none; background: transparent; padding: 10px 5px; font-weight: 700; font-size: 12px; outline: none; box-sizing: border-box; text-align: inherit; }
    .input-price { font-weight: 900 !important; color: black !important; text-align: right !important; padding-right: 10px !important; }
    .prio-cell { font-weight: 900; text-align: center; font-size: 10px; text-transform: uppercase; color: black; }
    .prio-CRITICA { background-color: #ff5252 !important; color: white; }
    .prio-ALTA { background-color: #ffab40 !important; }
    .prio-MEDIA { background-color: #ffff00 !important; }
    .prio-BAJA { background-color: #40c4ff !important; }
    .total-text { font-size: 15px; font-weight: 900; color: #d32f2f; }
    
    .prov-btn { border:none; background:#eee; font-weight:900; cursor:pointer; height:32px; border-radius:4px; font-size:10px; width: 100%; text-overflow: ellipsis; overflow: hidden; }
    .use-last-btn { border:none; background:var(--primary); color:white; font-size:14px; cursor:pointer; width:30px; height:32px; border-radius:4px; font-weight: bold; }
    
    .btn-clip { border:none; background:transparent; cursor:pointer; font-size:18px; color:var(--primary); transition: 0.2s; display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; }
    .btn-clip:hover { transform: scale(1.25); color: #000; }

    .btn-action { border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-weight: bold; font-size: 14px; display: inline-flex; align-items: center; justify-content: center; transition: 0.2s; margin: 0 2px; }
    .btn-undo { background: #666; color: white; }
    .btn-cancel { background: var(--danger); color: white; }

    /* --- TICKET FANTASMA --- */
    #ticket-container { position: absolute; left: -9999px; }
    #ticket-preview { width: 750px; background: white; position: relative; padding-bottom: 20px; }
    .ticket-body { background: white; margin: 0 15px; padding: 20px; border-radius: 5px; }
    .t-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    .t-table th, .t-table td { border: 1.5px solid #000; padding: 8px; font-size: 13px; text-transform: uppercase; color: #000; }
    .prio-banner { text-align: center; font-weight: 900; padding: 12px; font-size: 20px; text-transform: uppercase; color: #000; }
    
    .prog-container { display: flex; justify-content: space-between; position: relative; margin: 30px 40px; font-weight: 900; font-size: 10px; text-transform: uppercase; color: #333; }
    .prog-line { position: absolute; top: 18px; left: 0; width: 100%; height: 6px; background: #eee; z-index: 1; border-radius: 3px; }
    .prog-line-fill { position: absolute; top: 18px; left: 0; height: 6px; background: #1a237e; z-index: 2; border-radius: 3px; width: 0%; }
    .step { position: relative; z-index: 3; display: flex; flex-direction: column; align-items: center; width: 80px; }
    .circle { width: 40px; height: 40px; background: white; border: 4px solid #ddd; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; font-size: 18px; font-weight: 900; color: #ddd; }

    .estado-cotizado .circle-2 { background: #e3f2fd !important; border-color: #03a9f4 !important; color: #03a9f4 !important; }
    .estado-cotizado #p-fill { width: 35% !important; background: #03a9f4 !important; }
    
    .row-blue-quoted { background-color: #e3f2fd !important; }
    .row-gray-cancelled { background-color: #f5f5f5 !important; color: #aaa !important; text-decoration: line-through; }

    #modalProv { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 10000; }
    .modal-box { background: white; padding: 25px; border-radius: 20px; width: 500px; }
    .fab-save { position: fixed; bottom: 25px; right: 25px; background: #000; color: white; padding: 15px 40px; border-radius: 50px; border: none; font-weight: 900; cursor: pointer; display: none; box-shadow: 0 8px 20px rgba(0,0,0,0.4); font-size: 16px; }
    .btn-mini { padding: 8px 15px; font-size: 12px; background: #607d8b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div id="overlay">
  <div class="tool-container">
    <svg viewBox="0 0 500 150">
      <defs><mask id="mask-text"><text x="250" y="110" fill="white" class="text-svg">TOOL CN</text></mask></defs>
      <g class="clean-outline">
        <text x="250" y="110" fill="white" class="text-svg">TOOL CN</text>
        <g mask="url(#mask-text)"><rect class="liquid" x="0" y="0" width="500" height="150" fill="var(--vibrant-yellow)" /></g>
      </g>
    </svg>
  </div>
  <h2 id="load-msg" style="color:var(--primary); font-weight: 900;">Sincronizando...</h2>
</div>

<div class="filter-bar">
  <img src="https://www.toolcn.mx/cdn/shop/files/logo_ToolCN_shopify.png?v=1751677238" width="60">
  <input type="text" id="mainFilter" class="search-input" placeholder="🔍 Filtrar Folio, Solicitante o Descripción..." onkeyup="render()">
  <button class="btn-mini" onclick="toggleAll(true)">Todos</button>
  <button class="btn-mini" onclick="toggleAll(false)">Ninguno</button>
</div>

<!-- PANEL ESPEJO DE DESCRIPCION -->
<div id="descMirror" class="mirror-box">SELECCIONE UNA FILA PARA VER LA DESCRIPCIÓN...</div>

<div class="container">
  <table>
    <thead>
      <tr>
        <th class="col-fec">FECHA</th>
        <th class="col-adj">📎</th>
        <th class="col-fol">FOLIO</th>
        <th class="col-sol">SOLICITA</th>
        <th class="col-pa">PA</th>
        <th class="col-can">CANT</th>
        <th class="col-des">DESCRIPCION</th>
        <th class="col-prio">URGENCIA</th>
        <th class="col-pro">PROVEEDOR</th>
        <th class="col-mon">P. UNIT</th>
        <th class="col-mon">IVA</th>
        <th class="col-tot">TOTAL</th>
        <th class="col-mon">MONEDA</th>
        <th class="col-acc">ACC</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<button id="btnSave" class="fab-save" onclick="guardarCambios()">💾 GUARDAR COTIZACIONES (<span id="count">0</span>)</button>

<div id="ticket-container">
  <div id="ticket-preview">
    <div class="prio-banner" id="t-banner-top"></div>
    <div class="prog-container">
      <div class="prog-line"></div><div class="prog-line-fill" id="p-fill"></div>
      <div class="step"><div class="circle circle-1">1</div>Solicitado</div>
      <div class="step"><div class="circle circle-2">2</div>Cotizado</div>
      <div class="step"><div class="circle circle-3">3</div>Autorizado</div>
      <div class="step"><div class="circle circle-4">4</div>Parcial</div>
      <div class="step"><div class="circle circle-5">5</div>Terminado</div>
    </div>
    <div class="ticket-body">
      <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:2.5px solid #000; padding-bottom:12px;">
        <div><h2 style="margin:0; text-transform:uppercase;">Requisición de Compra</h2><b id="t-folio" style="font-size:24px; color:red;"></b></div>
        <img src="https://www.toolcn.mx/cdn/shop/files/logo_ToolCN_shopify.png?v=1751677238" width="150">
      </div>
      <div style="margin-top:10px; font-size:16px;">SOLICITA: <b id="t-sol"></b></div>
      <table class="t-table"><thead><tr><th width="60">CANT</th><th width="90">UNI</th><th>DESCRIPCIÓN</th></tr></thead><tbody id="t-body"></tbody></table>
      <div style="margin-top:10px; border-top:2px solid #000; padding-top:10px; font-size:14px;"><b>OBS:</b> <span id="t-obs"></span></div>
    </div>
    <div class="prio-banner" id="t-banner-bottom"></div>
  </div>
</div>

<div id="modalProv">
  <div class="modal-box">
    <h3>Seleccionar Proveedor</h3>
    <input type="text" id="busqProv" class="search-input" style="width:100%; border: 1px solid #ccc; margin-bottom:10px;" placeholder="Buscar..." onkeyup="filtrarProv()">
    <label style="font-size:12px; font-weight:bold;"><input type="checkbox" id="checkApplyAll"> Aplicar a todas las partidas</label>
    <div id="listaProv" style="margin-top:15px; border:1px solid #eee; max-height:300px; overflow-y:auto;"></div>
    <button onclick="cerrarModal()" style="width:100%; margin-top:15px; padding:10px; background:#666; color:white; border:none; border-radius:10px;">CERRAR</button>
  </div>
</div>

<script>
const CHAT_IDS_USUARIOS = {
  "ALMACEN": "625827165", "EDI ZUÑIGA": "625827165", "ABRAHAM PENSADO": "1935511253", "ALDAIR GÓMEZ": "859841328",
  "REBECA ANGEL": "1293433169", "JORGE SÁNCHEZ": "625827165", "EZEQUIEL VELAZQUEZ": "625827165",
  "PATRICIA TORRES": "1288025824", "DAVID MONDRAGON": "35649383", "ROBERTO DÍAZ": "625827165"
};
let datos = [], original = [], proveedores = [], lastProv = "", idEdit = "";
const nF2 = new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2, useGrouping: true });

window.onload = () => { init(); };

function init() {
  document.getElementById('overlay').style.display = 'flex';
  google.script.run.withSuccessHandler(res => {
    datos = res.lista; original = JSON.parse(JSON.stringify(res.lista)); proveedores = res.proveedores;
    render(); document.getElementById('overlay').style.display = 'none';
  }).obtenerDatosCotizacion();
}

function render() {
  const filterVal = document.getElementById('mainFilter').value.toLowerCase();
  const body = document.getElementById('tableBody');
  const filtrados = datos.filter(item => Object.values(item).some(v => String(v).toLowerCase().includes(filterVal)));
  body.innerHTML = filtrados.map(item => {
    const oItem = original.find(o => o.id === item.id);
    const mod = JSON.stringify(item) !== JSON.stringify(oItem);
    const prioridad = (item.prioridad || "MEDIA").toUpperCase().trim();
    return `<tr id="row-${item.id}" class="${mod ? 'row-modified' : ''}" onclick="enfocarFila('${item.id}')">
        <td align="center">${item.fecha}</td>
        <td align="center">
          ${item.url ? `<button class="btn-clip" onclick="window.open('${item.url}', '_blank')" title="Ver Adjunto">📎</button>` : ''}
        </td>
        <td align="center"><b>${item.folio}</b></td><td>${item.solicita}</td><td align="center" style="font-weight:bold;">${item.pa}</td>
        <td><input type="number" class="input-edit" style="text-align:center" id="cant-${item.id}" value="${item.cant}" oninput="recalc('${item.id}', 'cant', this.value)" onkeydown="nav(event, '${item.id}', 0)"></td>
        <td><input type="text" class="input-edit" id="desc-${item.id}" value="${item.desc}" oninput="updValInstant('${item.id}', this.value)" onkeydown="nav(event, '${item.id}', 1)"></td>
        <td class="prio-cell prio-${prioridad.replace(/\s/g,'')}">${prioridad}</td>
        <td style="padding: 0 4px;"><div style="display:flex; align-items:center; gap:2px;"><button class="prov-btn" onclick="abrirProv('${item.id}')">${item.proveedor || '(PROV)'}</button>${(!item.proveedor && lastProv) ? `<button class="use-last-btn" onclick="useLast('${item.id}')">⚡</button>` : ''}</div></td>
        <td><input type="number" class="input-edit input-price" id="pre-${item.id}" value="${item.precio}" step="0.001" oninput="recalc('${item.id}', 'precio', this.value)" onkeydown="nav(event, '${item.id}', 2)"></td>
        <td><input type="number" class="input-edit input-price" id="iva-${item.id}" value="${parseFloat(item.iva || 0).toFixed(2)}" step="0.01" oninput="recalc('${item.id}', 'iva', this.value)" onkeydown="nav(event, '${item.id}', 3)"></td>
        <td align="right" id="tot-disp-${item.id}" class="total-text" style="padding-right:10px;">$ ${nF2.format(item.total)}</td>
        <td><select class="input-edit" id="mon-${item.id}" onchange="updVal('${item.id}', 'moneda', this.value)" onkeydown="nav(event, '${item.id}', 4)"><option value="MXN" ${item.moneda==='MXN'?'selected':''}>MXN</option><option value="USD" ${item.moneda==='USD'?'selected':''}>USD</option></select></td>
        <td align="center">
          <div style="display:flex; justify-content:center;">
            ${mod ? `<button class="btn-action btn-undo" onclick="undo('${item.id}')" title="Deshacer">↺</button>` : ''}
            <button class="btn-action btn-cancel" onclick="cancelarItem('${item.id}')" title="Cancelar Requerimiento">❌</button>
          </div>
        </td>
      </tr>`;
  }).join('');
  actualizarContador();
}

function enfocarFila(id) {
  document.querySelectorAll('tr').forEach(r => r.classList.remove('row-active'));
  const el = document.getElementById('row-' + id);
  if(el) el.classList.add('row-active');
  
  const item = datos.find(x => x.id === id);
  if(item) document.getElementById('descMirror').innerText = item.desc;
}

function updValInstant(id, val) {
  const item = datos.find(x => x.id === id);
  if(item) {
    item.desc = val.toUpperCase();
    document.getElementById('descMirror').innerText = item.desc;
    verificarCambio(id);
  }
}

async function cancelarItem(id) {
  const item = datos.find(x => x.id === id);
  if(!confirm("¿Seguro que desea CANCELAR la partida: " + item.desc + "?")) return;
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('load-msg').innerText = "CANCELANDO Y NOTIFICANDO...";
  google.script.run.withSuccessHandler(async metaData => {
    if(metaData) { await actualizarTelegramMasivo(metaData, "CANCELADO"); }
  }).cancelarPartidaRequi(id);
}

function recalc(id, campo, val) {
  const item = datos.find(x => x.id === id);
  item[campo] = val;
  const c = parseFloat(item.cant || 0), p = parseFloat(item.precio || 0);
  if (campo === 'precio' || campo === 'cant') {
    item.iva = (p * c * 0.16).toFixed(2);
    document.getElementById('iva-' + id).value = item.iva;
  }
  item.total = ( (p * c) + parseFloat(item.iva || 0) ).toFixed(2);
  document.getElementById('tot-disp-'+id).innerText = "$ " + nF2.format(item.total);
  verificarCambio(id);
}

function guardarCambios() {
  const lote = datos.filter(item => JSON.stringify(item) !== JSON.stringify(original.find(o => o.id === item.id)));
  document.getElementById('overlay').style.display = 'flex';
  document.getElementById('load-msg').innerText = "ACTUALIZANDO TELEGRAM...";
  google.script.run.withSuccessHandler(resMetaData => {
    actualizarTelegramMasivo(resMetaData, "COTIZADO");
  }).guardarLoteCotizacion(lote);
}

async function actualizarTelegramMasivo(metaData, tipo) {
  const ticket = document.getElementById('ticket-preview');
  for (const folio in metaData) {
    const info = metaData[folio];
    if (info.msg_id && CHAT_IDS_USUARIOS[info.solicitante.toUpperCase()]) {
      document.getElementById('t-folio').innerText = folio;
      document.getElementById('t-sol').innerText = info.solicitante;
      document.getElementById('t-obs').innerText = (info.observaciones || "").toUpperCase();
      document.getElementById('ticket-preview').className = "estado-cotizado prio-" + info.prioridad;
      let h = "";
      info.partidas.forEach(p => {
        let clase = (p.estado === "COTIZADO" || p.estado === "COTIZADA") ? "row-blue-quoted" : (p.estado === "CANCELADO" ? "row-gray-cancelled" : "");
        h += `<tr class="${clase}"><td align="center">${p.cantidad}</td><td align="center">${p.unidad}</td><td>${p.descripcion}</td></tr>`;
      });
      document.getElementById('t-body').innerHTML = h;
      const canvas = await html2canvas(ticket, {scale: 2, useCORS: true});
      const base64 = canvas.toDataURL("image/png");
      await new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler(resolve)
          .withFailureHandler(reject)
          .editarTelegramPrivado(base64, folio, CHAT_IDS_USUARIOS[info.solicitante.toUpperCase()], info.msg_id, tipo);
      });
    }
  }
  document.getElementById('load-msg').innerText = "¡PROCESO COMPLETADO!";
  setTimeout(() => init(), 1000);
}

// AUXILIARES
function nav(e, id, colIdx) { const keys = ["cant", "desc", "pre", "iva", "mon"]; const rows = Array.from(document.querySelectorAll('#tableBody tr')); const currRowIdx = rows.findIndex(r => r.id === 'row-' + id); let nRow = currRowIdx, nCol = colIdx; if (e.key === "ArrowDown") nRow++; else if (e.key === "ArrowUp") nRow--; else if (e.key === "ArrowRight") nCol++; else if (e.key === "ArrowLeft") nCol--; else return; if (nCol > 4) nCol = 4; if (nCol < 0) nCol = 0; e.preventDefault(); if (rows[nRow]) { const nextId = rows[nRow].id.replace('row-',''); const target = document.getElementById(keys[nCol] + '-' + nextId); if (target) { target.focus(); if(target.select) target.select(); enfocarFila(nextId); } } }
function verificarCambio(id) { const item = datos.find(x => x.id === id); const oItem = original.find(o => o.id === id); const isMod = JSON.stringify(item) !== JSON.stringify(oItem); const row = document.getElementById('row-' + id); if (isMod) row.classList.add('row-modified'); else row.classList.remove('row-modified'); actualizarContador(); }
function useLast(id) { if(!lastProv) return; datos.find(x => x.id === id).proveedor = lastProv; render(); }
function abrirProv(id) { idEdit = id; document.getElementById('modalProv').style.display = 'flex'; filtrarProv(); }
function cerrarModal() { document.getElementById('modalProv').style.display = 'none'; }
function seleccionarProv(p) { lastProv = p; const item = datos.find(x => x.id === idEdit); if(document.getElementById('checkApplyAll').checked) { datos.forEach(d => { if(d.folio === item.folio) d.proveedor = p; }); } else { item.proveedor = p; } cerrarModal(); render(); }
function filtrarProv() { const b = document.getElementById('busqProv').value.toLowerCase(); document.getElementById('listaProv').innerHTML = proveedores.filter(p => p.nombre.toLowerCase().includes(b)).map(p => `<div style="padding:10px; border-bottom:1px solid #eee; cursor:pointer;" onclick="seleccionarProv('${p.nombre}')"><b>${p.nombre}</b></div>`).join(''); }
function updVal(id, c, v) { datos.find(x => x.id === id)[c] = v; render(); }
function undo(id) { const idx = datos.findIndex(x => x.id === id); datos[idx] = JSON.parse(JSON.stringify(original.find(o => o.id === id))); render(); }
function actualizarContador() { const modCount = datos.filter(item => JSON.stringify(item) !== JSON.stringify(original.find(o => o.id === item.id))).length; document.getElementById('btnSave').style.display = modCount > 0 ? 'block' : 'none'; document.getElementById('count').innerText = modCount; }
function toggleAll(st) { document.getElementById('mainFilter').value = ""; render(); }
</script>
</body>
</html>
